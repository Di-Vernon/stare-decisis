# myth Wave 7 — R3-B positive fixtures (18 cases)
# Rule: framework auth decorator bypass (csrf_exempt, never_cache, etc.).

rule: R3-B
expected_level: 5
category: bedrock
cases:
  - id: "01-csrf_exempt_bare"
    input: "@csrf_exempt"
    note: "bare @csrf_exempt"
  - id: "02-csrf_exempt_with_def"
    input: "@csrf_exempt\ndef view():"
    note: "csrf_exempt + function"
  - id: "03-never_cache_bare"
    input: "@never_cache"
    note: "bare @never_cache"
  - id: "04-login_not_required_bare"
    input: "@login_not_required"
    note: "bare @login_not_required"
  - id: "05-login_not_required_with_admin"
    input: "@login_not_required\ndef admin_view():"
    note: "login_not_required + admin view"
  - id: "06-skip_before_action_auth"
    input: "skip_before_action :authenticate"
    note: "Rails skip_before_action :authenticate"
  - id: "07-skip_before_action_auth_user"
    input: "skip_before_action :authenticate_user"
    note: "Rails skip_before_action :authenticate_user"
  - id: "08-skip_before_action_auth_admin"
    input: "skip_before_action :authenticate_admin_user"
    note: "Rails skip_before_action :authenticate_admin_user"
  - id: "09-auth_backends_empty_brackets"
    input: "AUTHENTICATION_BACKENDS = []"
    note: "Django empty AUTHENTICATION_BACKENDS"
  - id: "10-auth_backends_empty_no_space"
    input: "AUTHENTICATION_BACKENDS=[]"
    note: "no spaces around ="
  - id: "11-auth_backends_empty_spaces_inside"
    input: "AUTHENTICATION_BACKENDS = [ ]"
    note: "spaces inside brackets"
  - id: "12-drf_permission_classes_allowany"
    input: "permission_classes = [AllowAny]"
    note: "DRF AllowAny"
  - id: "13-drf_permission_classes_allowany_nospace"
    input: "permission_classes=[AllowAny]"
    note: "DRF AllowAny no space"
  - id: "14-drf_permission_classes_empty"
    input: "permission_classes = []"
    note: "DRF empty permission list"
  - id: "15-drf_authentication_classes_empty"
    input: "authentication_classes = []"
    note: "DRF empty auth classes"
  - id: "16-csrf_exempt_with_comment"
    input: "@csrf_exempt  # disable CSRF"
    note: "csrf_exempt + trailing comment"
  - id: "17-never_cache_with_comment"
    input: "@never_cache  # don't cache this"
    note: "never_cache + comment"
  - id: "18-login_not_required_with_comment"
    input: "@login_not_required  # public endpoint"
    note: "login_not_required + comment"
