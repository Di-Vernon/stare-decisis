# myth Wave 7 — R1-E positive fixtures (18 cases)
# Rule: other destructive verbs (dd/mkfs on block devices, chmod -R on /).

rule: R1-E
expected_level: 5
category: bedrock
cases:
  - id: "01-dd_zero_to_sda"
    input: "dd if=/dev/zero of=/dev/sda"
    note: "dd zero → raw sda"
  - id: "02-dd_backup_to_sdb"
    input: "dd if=backup.img of=/dev/sdb"
    note: "dd write to sdb"
  - id: "03-dd_to_nvme"
    input: "dd of=/dev/nvme0n1 if=/dev/urandom"
    note: "dd random → nvme"
  - id: "04-dd_to_sdc_bs"
    input: "dd of=/dev/sdc bs=4M if=/dev/zero"
    note: "dd zero with block size"
  - id: "05-dd_urandom_to_sdd1"
    input: "dd if=/dev/urandom of=/dev/sdd1"
    note: "dd urandom → sdd1"
  - id: "06-dd_iso_to_vda"
    input: "dd if=img.iso of=/dev/vda"
    note: "dd iso → virtio disk"
  - id: "07-dd_to_mmcblk"
    input: "dd of=/dev/mmcblk0 if=backup.bin"
    note: "dd → mmc/sdcard"
  - id: "08-dd_to_hda_legacy"
    input: "dd of=/dev/hdd if=input.bin"
    note: "dd → legacy ide hdd"
  - id: "09-mkfs_ext4_sda1"
    input: "mkfs.ext4 /dev/sda1"
    note: "mkfs.ext4 on sda1"
  - id: "10-mkfs_xfs_sdb"
    input: "mkfs.xfs /dev/sdb"
    note: "mkfs.xfs on sdb"
  - id: "11-mkfs_btrfs_nvme"
    input: "mkfs.btrfs /dev/nvme0n1"
    note: "mkfs.btrfs on nvme"
  - id: "12-mkfs_vfat_sdc1"
    input: "mkfs.vfat /dev/sdc1"
    note: "mkfs.vfat on sdc1"
  - id: "13-mkfs_ntfs_vda"
    input: "mkfs.ntfs /dev/vda"
    note: "mkfs.ntfs on virtio disk"
  - id: "14-mkfs_f2fs_sdd"
    input: "mkfs.f2fs /dev/sdd"
    note: "mkfs.f2fs on sdd"
  - id: "15-chmod_r_777_root"
    input: "chmod -R 777 /"
    note: "chmod recursive 777 on /"
  - id: "16-chmod_r_755_root"
    input: "chmod -R 755 /"
    note: "chmod recursive 755 on /"
  - id: "17-chmod_r_0755_root"
    input: "chmod -R 0755 /"
    note: "chmod recursive 0755 on /"
  - id: "18-chmod_r_644_root"
    input: "chmod -R 644 /"
    note: "chmod recursive 644 on /"
