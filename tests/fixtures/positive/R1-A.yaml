# myth Wave 7 — R1-A positive fixtures (20 cases)
#
# Rule: rm -rf flag permutation on dangerous paths (Bedrock, Level 5).
# All inputs synthetic. No real system paths expected to exist at test time.

rule: R1-A
expected_level: 5
category: bedrock
cases:
  - id: "01-rm_rf_root"
    input: "rm -rf /"
    note: "canonical rm -rf root"
  - id: "02-rm_fr_root"
    input: "rm -fr /"
    note: "swapped flag order fr"
  - id: "03-rm_Rf_root"
    input: "rm -Rf /"
    note: "uppercase R"
  - id: "04-rm_fR_root"
    input: "rm -fR /"
    note: "mixed case fR"
  - id: "05-rm_rfv_root"
    input: "rm -rfv /"
    note: "with verbose flag"
  - id: "06-rm_rfi_home"
    input: "rm -rfi /home/user"
    note: "interactive flag mixed in"
  - id: "07-sudo_rm_rf_root"
    input: "sudo rm -rf /"
    note: "sudo prefix"
  - id: "08-doas_rm_rf_root"
    input: "doas rm -rf /"
    note: "doas (BSD) prefix"
  - id: "09-long_opts_recursive_force"
    input: "rm --recursive --force /"
    note: "long flags in recursive-first order"
  - id: "10-long_opts_force_recursive"
    input: "rm --force --recursive /"
    note: "long flags in force-first order"
  - id: "11-rm_rf_etc"
    input: "rm -rf /etc"
    note: "system config directory"
  - id: "12-rm_rf_usr_bin"
    input: "rm -rf /usr/bin"
    note: "/usr tree"
  - id: "13-rm_rf_var_log"
    input: "rm -rf /var/log"
    note: "/var tree"
  - id: "14-rm_rf_opt"
    input: "rm -rf /opt"
    note: "third-party prefix"
  - id: "15-rm_rf_root_home"
    input: "rm -rf /root"
    note: "root user home"
  - id: "16-rm_rf_tilde"
    input: "rm -rf ~"
    note: "bare tilde"
  - id: "17-rm_rf_tilde_docs"
    input: "rm -rf ~/Documents"
    note: "tilde subpath"
  - id: "18-rm_rf_bin"
    input: "rm -rf /bin"
    note: "/bin tree (env-sentinel moved to R1-G)"
  - id: "19-rm_rf_sbin"
    input: "rm -rf /sbin"
    note: "/sbin tree (env-sentinel moved to R1-G)"
  - id: "20-rm_rf_root_glob"
    input: "rm -rf /*"
    note: "glob wildcard at root"
