    input: "find / -type f -delete"
    note: "find root with -delete"
  - id: "02-find_root_bare_delete"
    input: "find / -delete"
    note: "bare -delete"
  - id: "03-find_home_delete"
    input: "find /home -delete"
    note: "/home tree"
  - id: "04-find_etc_name_delete"
    input: 'find /etc -name "*.conf" -delete'
    note: "find with name filter"
  - id: "05-find_var_type_delete"
    input: "find /var -type d -delete"
    note: "/var directories"
  - id: "06-find_usr_delete"
    input: "find /usr -delete"
    note: "/usr tree"
  - id: "07-find_opt_delete"
    input: "find /opt -delete"
    note: "/opt tree"
  - id: "08-find_tilde_delete"
    input: "find ~ -delete"
    note: "home tilde"
  - id: "09-find_tilde_docs_delete"
    input: "find ~/Documents -delete"
    note: "tilde subpath"
  - id: "10-find_home_env_delete"
    input: "find $HOME -delete"
    note: "HOME env var"
