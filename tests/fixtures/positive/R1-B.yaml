  - id: "17-find_tilde_exec_rm"
    input: 'find ~ -exec rm {} \;'
    note: "tilde + exec rm"
  - id: "18-find_home_env_exec_rm"
    input: 'find $HOME -exec rm {} \;'
    note: "env home + exec rm"
  - id: "19-find_root_homeuser_delete"
    input: "find /root -delete"
