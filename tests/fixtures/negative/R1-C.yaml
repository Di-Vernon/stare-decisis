# myth Wave 7 — R1-C negative fixtures (18 near-miss cases)
# Rule: language APIs (rmtree/rmSync/removedirs) on dangerous paths.

rule_context: R1-C
expected: no_match
cases:
  - id: "01-shutil_rmtree_tmp_scratch"
    input: "shutil.rmtree('/tmp/scratch')"
    note: "tmp sandbox-safe"
  - id: "02-shutil_rmtree_tmp_bare"
    input: "shutil.rmtree('/tmp')"
    note: "tmp bare"
  - id: "03-shutil_rmtree_relative_build"
    input: "shutil.rmtree('./build')"
    note: "relative build"
  - id: "04-shutil_rmtree_relative_build_slash"
    input: "shutil.rmtree('build/')"
    note: "relative build trailing slash"
  - id: "05-os_rmdir_tmp_empty"
    input: "os.rmdir('/tmp/empty')"
    note: "tmp empty"
  - id: "06-fs_rmsync_tmp_file"
    input: "fs.rmSync('/tmp/file')"
    note: "tmp file"
  - id: "07-fs_rmsync_target"
    input: "fs.rmSync('./target')"
    note: "relative target"
  - id: "08-shutil_rmtree_mkdtemp"
    input: "shutil.rmtree(tempfile.mkdtemp())"
    note: "tempfile scratch dir (function)"
  - id: "09-shutil_copy_not_rmtree"
    input: "shutil.copy('/etc/hosts', '/tmp/')"
    note: "copy is not rmtree"
  - id: "10-shutil_move_not_rmtree"
    input: "shutil.move('/home/user/file.txt', '/tmp/')"
    note: "move is not rmtree"
  - id: "11-os_mkdir_not_rmdir"
    input: "os.mkdir('/tmp/newdir')"
    note: "mkdir is not rmdir"
  - id: "12-fs_mkdirsync_not_rm"
    input: "fs.mkdirSync('/tmp/x')"
    note: "mkdirSync is not rmSync"
  - id: "13-shutil_rmtree_variable"
    input: "shutil.rmtree(build_dir)"
    note: "variable arg (no literal)"
  - id: "14-os_rmdir_variable"
    input: "os.rmdir(temp_path)"
    note: "variable arg"
  - id: "15-fs_rmsync_function_arg"
    input: "fs.rmSync(os.tmpdir())"
    note: "function-call arg"
  - id: "16-os_listdir_not_rmdir"
    input: "os.listdir('/etc')"
    note: "listdir is not rmdir"
  - id: "17-fs_readfile_not_rm"
    input: "fs.readFileSync('/etc/hosts')"
    note: "readFileSync is not rmSync"
  - id: "18-shutil_rmtree_attr_arg"
    input: "shutil.rmtree(settings.TEMP_DIR)"
    note: "attribute access arg"
