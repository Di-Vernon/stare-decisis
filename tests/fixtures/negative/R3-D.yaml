# myth Wave 7 — R3-D negative fixtures (18 near-miss cases)
# Rule: diff-aware auth decorator removal.
#
# Multi-line inputs use double-quoted YAML with explicit \n escapes.

rule_context: R3-D
expected: no_match
cases:
  - id: "01-plus_at_login_required"
    input: "+@login_required"
    note: "addition (+) not removal (-)"
  - id: "02-at_login_required_no_prefix"
    input: "@login_required"
    note: "no diff prefix"
  - id: "03-minus_at_cache_exempt"
    input: "-@cache_exempt"
    note: "non-auth decorator"
  - id: "04-minus_at_staticmethod"
    input: "-@staticmethod"
    note: "staticmethod (non-auth)"
  - id: "05-minus_at_property"
    input: "-@property"
    note: "property (non-auth)"
  - id: "06-minus_comment_about_auth"
    input: "-# comment about auth"
    note: "diff-removed comment (no @)"
  - id: "07-minus_def_admin_view"
    input: "-def admin_view():"
    note: "function def removal (no @auth)"
  - id: "08-space_at_login_required"
    input: " @login_required"
    note: "context line (space prefix)"
  - id: "09-plus_space_at_login_required"
    input: "+    @login_required"
    note: "diff addition with indent"
  - id: "10-minus_at_login_require_typo"
    input: "-@login_require"
    note: "typo (missing 'd')"
  - id: "11-minus_at_login_required_suffix"
    input: "-@login_required_soon"
    note: "suffix breaks word boundary"
  - id: "12-minus_at_authenticated_suffix"
    input: "-@authenticated"
    note: "authenticated (d suffix breaks \\b)"
  - id: "13-diff_addition_login_required"
    input: "+@login_required\n def view():"
    note: "diff ADDING @login_required (safe)"
  - id: "14-diff_context_only"
    input: " @login_required\n def admin():"
    note: "context line only (no -)"
  - id: "15-diff_removed_pass"
    input: " @login_required\n-    pass"
    note: "diff removes body line (decorator unchanged)"
  - id: "16-diff_removed_comment_about_decorator"
    input: "-# @login_required was here"
    note: "comment removal (not decorator)"
  - id: "17-diff_addition_non_auth"
    input: "+def helper():"
    note: "adding non-auth function (no decorator)"
  - id: "18-diff_hunk_header"
    input: "@@ -10,5 +10,3 @@"
    note: "diff hunk header (not decorator line)"
