# myth Wave 7 — R1-E negative fixtures (18 near-miss cases)
# Rule: other destructive verbs (dd/mkfs on block devices, chmod -R on /).

rule_context: R1-E
expected: no_match
cases:
  - id: "01-dd_to_tmp_file"
    input: "dd if=/dev/urandom of=/tmp/random"
    note: "dd → tmp file"
  - id: "02-dd_to_relative"
    input: "dd if=backup.img of=./image.bin"
    note: "dd → relative file"
  - id: "03-dd_from_sda_to_file"
    input: "dd of=output.iso if=/dev/sda"
    note: "dd reads sda, writes file"
  - id: "04-dd_to_disk_img"
    input: "dd if=/dev/zero of=disk.img bs=1M"
    note: "dd → image file"
  - id: "05-mkfs_on_loop"
    input: "mkfs.ext4 -n /dev/loop0"
    note: "loop device (test)"
  - id: "06-mkfs_on_user_image"
    input: "mkfs.ext4 /home/user/image.img"
    note: "mkfs on file path"
  - id: "07-mkfs_on_relative_img"
    input: "mkfs.ext4 ./disk.img"
    note: "mkfs on relative file"
  - id: "08-mkdir_not_mkfs"
    input: "mkdir -p /etc/foo"
    note: "mkdir is not mkfs"
  - id: "09-mkdir_in_shm"
    input: "mkdir /dev/shm/x"
    note: "mkdir on /dev/shm"
  - id: "10-chmod_no_r_single_file"
    input: "chmod 777 file.txt"
    note: "chmod without -R"
  - id: "11-chmod_r_relative"
    input: "chmod -R 755 ./build"
    note: "chmod -R on relative path"
  - id: "12-chmod_r_tmp"
    input: "chmod -R 644 /tmp/project"
    note: "chmod -R on /tmp subdir"
  - id: "13-chmod_plus_x"
    input: "chmod +x script.sh"
    note: "chmod +x (no -R)"
  - id: "14-chown_not_chmod"
    input: "chown -R user:user /srv"
    note: "chown is not chmod"
  - id: "15-chmod_r_srv_subdir"
    input: "chmod -R 755 /srv/app"
    note: "chmod -R on /srv/app (subpath)"
  - id: "16-dd_to_null"
    input: "dd if=/dev/random of=/dev/null"
    note: "dd → null sink"
  - id: "17-parted_not_mkfs"
    input: "parted /dev/sda"
    note: "parted is not mkfs"
  - id: "18-fdisk_not_mkfs"
    input: "fdisk /dev/sda"
    note: "fdisk is not mkfs"
