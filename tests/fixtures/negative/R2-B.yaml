# myth Wave 7 — R2-B negative fixtures (18 near-miss cases)
# Rule: PEM private key block + URL basic-auth.

rule_context: R2-B
expected: no_match
cases:
  - id: "01-pem_certificate"
    input: "-----BEGIN CERTIFICATE-----"
    note: "public certificate (not private key)"
  - id: "02-pem_public_key"
    input: "-----BEGIN PUBLIC KEY-----"
    note: "public key block"
  - id: "03-pem_csr"
    input: "-----BEGIN CERTIFICATE REQUEST-----"
    note: "certificate request"
  - id: "04-pem_dh_params"
    input: "-----BEGIN DH PARAMETERS-----"
    note: "DH parameters"
  - id: "05-url_no_auth"
    input: "https://api.example.com/v1/resource"
    note: "URL without user:pass@"
  - id: "06-url_user_only"
    input: "https://admin@api.example.com"
    note: "URL with user but no password"
  - id: "07-url_password_too_short"
    input: "https://admin:abc@api.example.com"
    note: "password only 3 chars (needs 8+)"
  - id: "08-url_with_path_only"
    input: "https://example.com/path/to/resource"
    note: "URL path with no auth"
  - id: "09-plain_text_no_pem"
    input: "This is just a plain text string."
    note: "no PEM header"
  - id: "10-text_with_dashes"
    input: "-----END CERTIFICATE-----"
    note: "END marker (not BEGIN PRIVATE)"
  - id: "11-begin_message"
    input: "-----BEGIN MESSAGE-----"
    note: "BEGIN MESSAGE (not KEY)"
  - id: "12-email_with_colon"
    input: "Email: user@example.com"
    note: "email pattern (not URL auth)"
  - id: "13-url_fragment_only"
    input: "/api/v1/resource"
    note: "URL path only"
  - id: "14-https_no_scheme_auth"
    input: "api.example.com:443"
    note: "host:port (not auth)"
  - id: "15-pem_wrong_algo"
    input: "-----BEGIN XYZ PRIVATE KEY-----"
    note: "unknown algorithm"
  - id: "16-url_github_ssh"
    input: "git@github.com:user/repo.git"
    note: "SSH git URL (user@ but no :pass@)"
  - id: "17-url_localhost"
    input: "http://localhost:3000/api"
    note: "localhost no auth"
  - id: "18-json_data_no_secret"
    input: '{"host": "example.com", "port": 443}'
    note: "JSON config no credential"
