# myth Wave 7 — R3-B negative fixtures (18 near-miss cases)
# Rule: framework auth decorator bypass.

rule_context: R3-B
expected: no_match
cases:
  - id: "01-login_required_bare"
    input: "@login_required"
    note: "login_required (opposite)"
  - id: "02-requires_auth_bare"
    input: "@requires_auth"
    note: "requires_auth (opposite)"
  - id: "03-authenticated_bare"
    input: "@authenticated"
    note: "authenticated decorator (safe)"
  - id: "04-permission_required_bare"
    input: "@permission_required"
    note: "permission_required (safe)"
  - id: "05-before_action_auth_user_bang"
    input: "before_action :authenticate_user!"
    note: "Rails before_action (not skip)"
  - id: "06-before_action_auth"
    input: "before_action :authenticate"
    note: "Rails before_action :authenticate"
  - id: "07-auth_backends_populated"
    input: "AUTHENTICATION_BACKENDS = ['django.contrib.auth.backends.ModelBackend']"
    note: "populated backends list"
  - id: "08-auth_backends_custom"
    input: "AUTHENTICATION_BACKENDS = [CustomBackend]"
    note: "custom backend"
  - id: "09-drf_permission_is_authenticated"
    input: "permission_classes = [IsAuthenticated]"
    note: "DRF IsAuthenticated (safe)"
  - id: "10-drf_permission_is_admin"
    input: "permission_classes = [IsAdminUser]"
    note: "DRF IsAdminUser (safe)"
  - id: "11-drf_auth_classes_token"
    input: "authentication_classes = [TokenAuthentication]"
    note: "DRF TokenAuthentication"
  - id: "12-cache_control_no_cache"
    input: "@cache_control(no_cache=True)"
    note: "cache_control (different decorator)"
  - id: "13-method_decorator_csrf"
    input: "@method_decorator(csrf_exempt)"
    note: "method_decorator wrapper (no @csrf_exempt prefix)"
  - id: "14-authenticate_function_def"
    input: "def authenticate(user):"
    note: "function definition"
  - id: "15-csrf_exempt_variable"
    input: "csrf_exempt_list = []"
    note: "variable name (no @)"
  - id: "16-csrf_exempt_attr"
    input: "config.csrf_exempt = True"
    note: "attribute access (no @)"
  - id: "17-auth_backends_append"
    input: "AUTHENTICATION_BACKENDS += [NewBackend]"
    note: "append operator (not =)"
  - id: "18-permission_classes_method"
    input: "permission_classes.append(IsAuthenticated)"
    note: "append method (not assignment)"
