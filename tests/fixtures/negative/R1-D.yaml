    note: "no target branch"
  - id: "05-reset_hard_feature_branch"
    input: "git reset --hard feature/xyz"
    note: "feature branch not protected"
  - id: "06-reset_hard_local_branch"
    input: "git reset --hard local-dev"
    note: "local branch"
