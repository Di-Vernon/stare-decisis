    input: "git reset HEAD"
    note: "reset without --hard"
  - id: "02-reset_soft_head1"
    input: "git reset --soft HEAD~1"
    note: "--soft not --hard"
  - id: "03-reset_hard_head_bare"
    input: "git reset --hard HEAD"
    note: "HEAD without ~N"
