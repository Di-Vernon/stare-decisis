# myth Wave 7 — R1-F negative fixtures (18 near-miss cases)
# Rule: docker/k8s cluster-scoped destructive operations.

rule_context: R1-F
expected: no_match
cases:
  - id: "01-docker_ps"
    input: "docker ps"
    note: "ps is read-only"
  - id: "02-docker_rm_container_by_name"
    input: "docker rm my_container"
    note: "rm single named container"
  - id: "03-docker_rm_f_container_name"
    input: "docker rm -f container_name"
    note: "rm -f named container (not $(docker ps))"
  - id: "04-docker_stop_container"
    input: "docker stop my_container"
    note: "stop is recoverable"
  - id: "05-docker_container_prune"
    input: "docker container prune"
    note: "container prune (not system prune -a)"
  - id: "06-docker_system_prune_no_a"
    input: "docker system prune"
    note: "system prune without -a"
  - id: "07-docker_volume_rm"
    input: "docker volume rm myvolume"
    note: "rm named volume"
  - id: "08-docker_image_rm"
    input: "docker image rm nginx"
    note: "rm named image"
  - id: "09-docker_network_prune"
    input: "docker network prune"
    note: "network prune (not covered)"
  - id: "10-kubectl_get_ns"
    input: "kubectl get ns"
    note: "get is read-only"
  - id: "11-kubectl_delete_pod"
    input: "kubectl delete pod my-pod"
    note: "pod delete (not ns)"
  - id: "12-kubectl_delete_pod_all"
    input: "kubectl delete pod --all"
    note: "all pods in ns (not ns itself)"
  - id: "13-kubectl_delete_ns_custom"
    input: "kubectl delete ns my-custom-ns"
    note: "user namespace (not protected)"
  - id: "14-kubectl_delete_namespace_test"
    input: "kubectl delete namespace test-env"
    note: "test env namespace"
  - id: "15-kubectl_apply_manifest"
    input: "kubectl apply -f manifest.yaml"
    note: "apply is additive"
  - id: "16-kubectl_scale_zero"
    input: "kubectl scale deploy/app --replicas=0"
    note: "scale-to-zero (recoverable)"
  - id: "17-docker_build"
    input: "docker build -t app ."
    note: "build is additive"
  - id: "18-docker_run"
    input: "docker run -d nginx"
    note: "run is additive"
